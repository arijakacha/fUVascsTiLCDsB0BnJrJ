# Email Configuration for NexusPlay
# Replace these values with your actual email settings

# Gmail SMTP Settings
smtp.host=smtp.gmail.com
smtp.port=587
smtp.username=your-email@gmail.com
smtp.password=your-app-password

# Email Display Settings
email.from=NexusPlay <your-email@gmail.com>
email.from.name=NexusPlay Support

# Instructions:
# 1. Replace your-email@gmail.com with your actual Gmail address
# 2. Replace your-app-password with your Gmail App Password
# 3. To get an App Password:
#    - Enable 2-factor authentication on your Gmail account
#    - Go to: https://myaccount.google.com/apppasswords
#    - Generate a new app password for "NexusPlay"
#    - Use that 16-character password here
